const API_BASE = "https://api.agdb.cloud/v1";

const Store = {
  read(key, def) {
    try { const v = localStorage.getItem(key); return v === null ? def : JSON.parse(v); }
    catch (e) { return def; }
  },
  write(key, val) { localStorage.setItem(key, JSON.stringify(val)); },
  remove(key) { localStorage.removeItem(key); }
};

const State = {
  get account() { return Store.read("agdb_account", null); },
  set account(v) { Store.write("agdb_account", v); },
  get session() { return Store.read("agdb_session", null); },
  set session(v) { Store.write("agdb_session", v); },
  get apikeys() { return Store.read("agdb_apikeys", []); },
  set apikeys(v) { Store.write("agdb_apikeys", v); },
  get tenant() { return Store.read("agdb_tenant", null); },
  set tenant(v) { Store.write("agdb_tenant", v); },
  get sandbox() { return Store.read("agdb_sandbox", { status: "stopped", uptime: 0, restarts: 0 }); },
  set sandbox(v) { Store.write("agdb_sandbox", v); },
  get db() { return Store.read("agdb_db", { records: [] }); },
  set db(v) { Store.write("agdb_db", v); },
  get history() { return Store.read("agdb_history", []); },
  set history(v) { Store.write("agdb_history", v); },

  get notifications() { return Store.read("agdb_notifications", []); },

  get settings() { return Store.read("agdb_settings", { theme: "light", lang: "hu", notifEmail: true, notifWebhook: false, onboarded: false }); },
  set settings(v) { Store.write("agdb_settings", v); },
  get billing() { return Store.read("agdb_billing", { plan: "free", since: Date.now(), autoRenew: true }); },
  set billing(v) { Store.write("agdb_billing", v); },
  get metrics() { return Store.read("agdb_metrics", null); },
  set metrics(v) { Store.write("agdb_metrics", v); }

function t(key) {
  const lang = State.settings.lang || "hu";
  return (I18N[lang] && I18N[lang][key]) || (I18N.hu[key]) || key;
}

function uid(prefix) {
  return (prefix || "id") + "_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function genApiKey() {
  const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let body = "";
  for (let i = 0; i < 40; i++) body += chars[Math.floor(Math.random() * chars.length)];
  return "agdb_sk_" + body;
}

function genTenantId() {
  const hex = "0123456789abcdef";
  const seg = n => Array.from({ length: n }, () => hex[Math.floor(Math.random() * 16)]).join("");
  return [seg(8), seg(4), seg(4), seg(4), seg(12)].join("-");
}

function fmtDate(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleString(State.settings.lang === "en" ? "en-US" : "hu-HU", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
}

function fmtRelative(ts) {
  if (!ts) return "—";
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if (min < 1) return State.settings.lang === "en" ? "just now" : "épp most";
  if (min < 60) return min + (State.settings.lang === "en" ? " min ago" : " perce");
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + (State.settings.lang === "en" ? " h ago" : " órája");
  const day = Math.floor(hr / 24);
  return day + (State.settings.lang === "en" ? " d ago" : " napja");
}

function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function toast(message, type) {
  type = type || "info";
  const colors = {
    success: "border-l-4 border-emerald-500",
    error: "border-l-4 border-red-500",
    info: "border-l-4 border-primary-blue",
    warning: "border-l-4 border-amber-500"
  };
  const icons = {
    success: '<span class="text-emerald-500">' + ICONS.check + '</span>',
    error: '<span class="text-red-500">' + ICONS.x + '</span>',
    info: '<span class="text-primary-blue">' + ICONS.info + '</span>',
    warning: '<span class="text-amber-500">' + ICONS.warn + '</span>'
  };
  const el = document.createElement("div");
  el.className = "toast-in bg-white dark:bg-surface-dark shadow-lg rounded-xl p-4 flex items-start gap-3 " + colors[type];
  el.innerHTML = '<div class="shrink-0 mt-0.5">' + icons[type] + '</div><div class="text-sm font-geist text-text-medium dark:text-text-medium-dark flex-1">' + escapeHtml(message) + '</div>';
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => {
    el.style.transition = "opacity 0.3s, transform 0.3s";
    el.style.opacity = "0";
    el.style.transform = "translateX(120%)";
    setTimeout(() => el.remove(), 300);
  }, 3600);
}

function copyText(text, label) {
  const done = () => toast((label || "Tartalom") + " " + t("copied").toLowerCase(), "success");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); cb(); } catch (e) { toast("Másolás sikertelen", "error"); }
  ta.remove();
}

function addLog(type, message, meta) {
  const logs = State.logs;
  logs.unshift({ id: uid("log"), type: type, message: message, meta: meta || "", ts: Date.now(), ip: "10.0." + Math.floor(Math.random() * 255) + "." + Math.floor(Math.random() * 255) });
  if (logs.length > 500) logs.length = 500;
  State.logs = logs;
}

function pushNotification(title, body, kind) {
  const n = State.notifications;
  n.unshift({ id: uid("ntf"), title: title, body: body, kind: kind || "info", ts: Date.now(), read: false });
  if (n.length > 200) n.length = 200;
  State.notifications = n;
}

function modal(title, bodyHtml, opts) {
  opts = opts || {};
  const root = document.getElementById("modal-root");
  const wrap = document.createElement("div");
  wrap.className = "fixed inset-0 z-[90] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm fade-in";
  wrap.innerHTML =
    '<div class="bg-white dark:bg-surface-dark rounded-3xl shadow-2xl w-full max-w-lg max-h-[88vh] overflow-y-auto">' +
      '<div class="flex items-center justify-between p-6 border-b border-border-light dark:border-border-dark">' +
        '<h3 class="text-lg font-semibold font-geist">' + escapeHtml(title) + '</h3>' +
        '<button data-close class="p-2 rounded-full hover:bg-surface-gray dark:hover:bg-background-dark text-text-medium dark:text-text-medium-dark">' + ICONS.x + '</button>' +
      '</div>' +
      '<div class="p-6">' + bodyHtml + '</div>' +
    '</div>';
  root.appendChild(wrap);
  const close = () => wrap.remove();
  wrap.querySelector("[data-close]").addEventListener("click", close);
  wrap.addEventListener("click", e => { if (e.target === wrap) close(); });
  if (opts.onMount) opts.onMount(wrap, close);
  return { wrap: wrap, close: close };
}

function confirmDialog(title, message, onConfirm, opts) {
  opts = opts || {};
  const danger = opts.danger;
  const body =
    '<p class="text-text-medium dark:text-text-medium-dark mb-6">' + escapeHtml(message) + '</p>' +
    (opts.requireText ? '<input id="confirm-text-input" class="w-full mb-4 px-4 py-2.5 rounded-xl border border-border-light dark:border-border-dark bg-surface-gray dark:bg-background-dark font-geist text-sm" placeholder="' + escapeHtml(opts.requireText) + '">' : '') +
    '<div class="flex justify-end gap-3">' +
      '<button data-cancel class="px-5 py-2.5 rounded-full font-medium text-sm bg-surface-gray dark:bg-background-dark hover:opacity-80">' + t("cancel") + '</button>' +
      '<button data-ok class="px-5 py-2.5 rounded-full font-medium text-sm text-white ' + (danger ? "bg-red-500 hover:bg-red-600" : "bg-primary-blue hover:opacity-90") + '">' + (opts.okLabel || t("confirm")) + '</button>' +
    '</div>';
  const m = modal(title, body, {
    onMount(wrap, close) {
      wrap.querySelector("[data-cancel]").addEventListener("click", close);
      wrap.querySelector("[data-ok]").addEventListener("click", () => {
        if (opts.requireText) {
          const val = wrap.querySelector("#confirm-text-input").value.trim();
          if (val !== opts.requireText) { toast("A megerősítő szöveg nem egyezik", "error"); return; }
        }
        close(); onConfirm();
      });
    }
  });
  return m;
}

function applyTheme() {
  const s = State.settings;
  document.documentElement.classList.toggle("dark", s.theme === "dark");
  document.documentElement.lang = s.lang;
}

function toggleTheme() {
  const s = State.settings;
  s.theme = s.theme === "dark" ? "light" : "dark";
  State.settings = s;
  applyTheme();
  render();
}

function setLang(lang) {
  const s = State.settings; s.lang = lang; State.settings = s;
  applyTheme(); render();
}

function ensureMetrics() {
  let m = State.metrics;
  const today = new Date().toISOString().slice(0, 10);
  if (!m || m.day !== today) {
    const series = [];
    for (let i = 23; i >= 0; i--) series.push({ h: i, requests: Math.floor(40 + Math.random() * 220), latency: Math.floor(18 + Math.random() * 70), errors: Math.floor(Math.random() * 6) });
    m = {
      day: today,
      totalRequests: 184320 + Math.floor(Math.random() * 9000),
      avgLatency: 42,
      p95Latency: 118,
      p99Latency: 246,
      errorRate: 0.42,
      series: series,
      cpu: 23 + Math.floor(Math.random() * 30),
      ram: 41 + Math.floor(Math.random() * 25),
      pids: 38 + Math.floor(Math.random() * 40),
      storageUsedMb: 412,
      storageQuotaMb: 1024
    };
    State.metrics = m;
  }
  return m;
}

function seedIfEmpty() {
  if (!State.account) return;
  if (State.db.records.length === 0) {
    const sample = [
      { id: "doc_1001", title: "Vector indexing overview", category: "engineering", content: "AGDB combines graph relationships with vector embeddings for hybrid retrieval at scale.", score: 0.98, tags: ["vector", "index", "graph"], createdAt: Date.now() - 86400000 * 6 },
      { id: "doc_1002", title: "Authentication with bearer tokens", category: "security", content: "All requests authenticate using a bearer API key passed in the Authorization header.", score: 0.91, tags: ["auth", "security", "api"], createdAt: Date.now() - 86400000 * 5 },
      { id: "doc_1003", title: "Tenant isolation model", category: "architecture", content: "Each tenant runs in an isolated sandbox with dedicated CPU, RAM and PID quotas.", score: 0.88, tags: ["tenant", "isolation", "sandbox"], createdAt: Date.now() - 86400000 * 4 },
      { id: "doc_1004", title: "Full text search ranking", category: "engineering", content: "Full text queries rank records by BM25 relevance combined with embedding similarity.", score: 0.95, tags: ["search", "ranking", "bm25"], createdAt: Date.now() - 86400000 * 3 },
      { id: "doc_1005", title: "Import and export pipelines", category: "data", content: "Import JSON or NDJSON datasets and export query results as JSON or CSV.", score: 0.82, tags: ["import", "export", "data"], createdAt: Date.now() - 86400000 * 2 },
      { id: "doc_1006", title: "Resource quota enforcement", category: "operations", content: "Quotas cap CPU seconds, RAM megabytes and concurrent PIDs per sandbox instance.", score: 0.79, tags: ["quota", "cpu", "ram"], createdAt: Date.now() - 86400000 }
    ];
    State.db = { records: sample };
  }
  if (State.saved.length === 0) {
    State.saved = [
      { id: uid("q"), name: "Engineering dokumentumok", query: { select: ["title", "category", "score"], from: "documents", where: [{ field: "category", op: "==", value: "engineering" }], orderBy: { field: "score", dir: "desc" }, limit: 10, topK: 5 }, createdAt: Date.now() - 86400000 * 2 }
    ];
  }
  if (State.logs.length === 0) {
    addLog("auth", "Sikeres bejelentkezés API kulccsal", "key: " + (State.session ? State.session.apiKey.slice(0, 16) + "…" : ""));
    addLog("query", "SELECT * FROM documents LIMIT 10", "rows: 6 · 38ms");
    addLog("security", "Új API kulcs generálva", "scope: full");
    addLog("access", "GET /v1/databases/documents", "200 · 41ms");
  }
  if (State.notifications.length === 0) {
    pushNotification("Üdvözöljük az AGDB-ben!", "A fiókja készen áll. Indítsa el a sandboxot az első lekérdezéshez.", "success");
    pushNotification("Sandbox készenlét", "A tenant sandbox inicializálva lett.", "info");
  }
}
</script>

    '</div>' +
    '<pre class="p-4 overflow-x-auto text-sm leading-relaxed bg-[#0f172a] text-[#e2e8f0]"><code>' + escapeHtml(code) + '</code></pre>' +

function badge(text, kind) {
  const map = {
    green: "bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-300",

  };

function emptyState(icon, title, subtitle, actionHtml) {

function loadingBlock(label) {

    '<span class="spin">' + ICONS.refresh + '</span><span class="font-geist">' + escapeHtml(label || "Betöltés...") + '</span></div>';

function field(label, inputHtml, hint) {

<script>
function isAuthed() { return !!(State.session && State.session.loggedIn); }

const NAV = [
  { group: "group_overview", items: [
    { id: "dashboard", label: "nav_dashboard", icon: "dashboard" }
  ]},
  { group: "group_account", items: [
    { id: "apikeys", label: "nav_apikeys", icon: "key" },
    { id: "tenant", label: "nav_tenant", icon: "building" },

    { id: "billing", label: "nav_billing", icon: "card" }
  ]},
  { group: "group_infra", items: [
    { id: "sandbox", label: "nav_sandbox", icon: "server" },
    { id: "storage", label: "nav_storage", icon: "database" },
    { id: "status", label: "nav_status", icon: "heart" }
  ]},
  { group: "group_data", items: [
    { id: "query", label: "nav_query", icon: "terminal" },
    { id: "search", label: "nav_search", icon: "search" },
    { id: "history", label: "nav_history", icon: "clock" },
    { id: "saved", label: "nav_saved", icon: "bookmark" },

  ]},

    { id: "audit", label: "nav_audit", icon: "shield" },
    { id: "notifications", label: "nav_notifications", icon: "bell" },
    { id: "webhooks", label: "nav_webhooks", icon: "swap" }
  ]},
  { group: "group_dev", items: [
    { id: "console", label: "nav_console", icon: "terminal" },
    { id: "tester", label: "nav_tester", icon: "play" },
    { id: "jsontools", label: "nav_jsontools", icon: "code" },
    { id: "samples", label: "nav_samples", icon: "code" }
  ]},
  { group: "group_docs", items: [

    { id: "feedback", label: "nav_feedback", icon: "heart" }
  ]}
];

function navLabelById(id) {
  for (const g of NAV) for (const it of g.items) if (it.id === id) return t(it.label);
  return id;
}

let sidebarOpen = false;

function render() {
  applyTheme();
  const app = document.getElementById("app");
  const hash = (location.hash || "#/").replace(/^#\/?/, "");
  const route = hash.split("?")[0] || "";

  if (!isAuthed()) {
    if (route === "register") { app.innerHTML = Pages.register(); afterAuthRender("register"); return; }
    if (route === "login") { app.innerHTML = Pages.login(); afterAuthRender("login"); return; }
    if (route === "legal" || route === "support" || route === "status" || route === "docs") {
      app.innerHTML = renderPublicShell(route);
      afterPublicRender(route);
      return;
    }
    app.innerHTML = Pages.landing();
    afterLandingRender();
    return;
  }

  seedIfEmpty();
  if (!State.settings.onboarded) {
    app.innerHTML = Pages.onboarding();
    Pages.onboardingInit && Pages.onboardingInit();
    return;
  }

  const known = NAV.some(g => g.items.some(it => it.id === route));
  const current = known ? route : "dashboard";
  app.innerHTML = renderAppShell(current);
  const fn = Pages[current];
  const main = document.getElementById("page-content");
  if (fn) {
    main.innerHTML = '<div class="fade-in">' + fn() + '</div>';
    const initFn = Pages[current + "Init"];
    if (initFn) initFn();
  }
  bindShell(current);
}

function renderPublicShell(route) {
  const map = { legal: Pages.legal, support: Pages.support, status: Pages.status, docs: Pages.docs };

  return '<div class="min-h-screen">' + publicNav() + '<main class="max-w-6xl mx-auto px-6 py-12 fade-in">' + fn() + '</main>' + publicFooter() + '</div>';

function afterPublicRender(route) {
  bindPublicNav();
  const initFn = Pages[route + "Init"];
  if (initFn) initFn();
}

function publicNav() {
  return '<header class="sticky top-0 z-40 backdrop-blur bg-white/80 dark:bg-background-dark/80 border-b border-border-light dark:border-border-dark">' +
    '<div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">' +
      '<a href="#/" class="flex items-center gap-2.5 font-semibold text-lg"><span class="w-9 h-9 rounded-xl brand-gradient text-white flex items-center justify-center">' + ICONS.logo + '</span>AGDB</a>' +
      '<nav class="hidden md:flex items-center gap-6 text-sm font-geist text-text-medium dark:text-text-medium-dark">' +
        '<a href="#/docs" class="hover:text-primary-blue">Dokumentáció</a>' +
        '<a href="#/status" class="hover:text-primary-blue">Rendszerállapot</a>' +
        '<a href="#/support" class="hover:text-primary-blue">Támogatás</a>' +
        '<a href="#/legal" class="hover:text-primary-blue">Jogi</a>' +
      '</nav>' +
      '<div class="flex items-center gap-3">' +
        '<button data-theme class="p-2 rounded-full hover:bg-surface-gray dark:hover:bg-surface-dark">' + (State.settings.theme === "dark" ? ICONS.sun : ICONS.moon) + '</button>' +
        '<a href="#/login" class="hidden sm:inline-flex px-4 py-2 rounded-full text-sm font-medium hover:bg-surface-gray dark:hover:bg-surface-dark">' + t("login") + '</a>' +
        '<a href="#/register" class="inline-flex px-4 py-2 rounded-full bg-primary-blue text-white text-sm font-medium hover:opacity-90">' + t("register") + '</a>' +
      '</div>' +
    '</div></header>';
}
function bindPublicNav() {
  const tb = document.querySelector("[data-theme]");
  if (tb) tb.addEventListener("click", toggleTheme);
}
function publicFooter() {
  return '<footer class="border-t border-border-light dark:border-border-dark mt-16">' +
    '<div class="max-w-6xl mx-auto px-6 py-10 grid grid-cols-2 md:grid-cols-4 gap-8 text-sm font-geist">' +

      '<nav class="flex-1 overflow-y-auto px-3 py-3">' + navHtml + '</nav>' +
      '<div class="p-3 border-t border-border-light dark:border-border-dark">' +
        '<button data-logout class="flex items-center gap-3 w-full px-3 py-2 rounded-xl text-sm font-geist text-text-medium dark:text-text-medium-dark hover:bg-surface-gray dark:hover:bg-background-dark">' + ICONS.logout + t("logout") + '</button>' +
      '</div>' +
    '</aside>';

  const acc = State.account;
  const topbar =
    '<header class="sticky top-0 z-30 h-16 bg-white/85 dark:bg-surface-dark/85 backdrop-blur border-b border-border-light dark:border-border-dark flex items-center gap-3 px-4 sm:px-6">' +

      '<div class="hidden sm:flex items-center gap-2 text-text-medium dark:text-text-medium-dark flex-1 max-w-md">' +
        '<span class="absolute pointer-events-none ml-3 opacity-60">' + ICONS.search + '</span>' +
        '<input id="global-search" class="w-full pl-10 pr-4 py-2 rounded-full bg-surface-gray dark:bg-background-dark border border-border-light dark:border-border-dark text-sm font-geist focus:outline-none focus:ring-2 focus:ring-primary-blue/40" placeholder="' + t("search_placeholder") + '">' +
      '</div>' +
      '<div class="flex items-center gap-2 ml-auto">' +
        '<select data-lang class="px-3 py-2 rounded-full bg-surface-gray dark:bg-background-dark border border-border-light dark:border-border-dark text-sm font-geist">' +
          '<option value="hu"' + (State.settings.lang === "hu" ? " selected" : "") + '>HU</option>' +
          '<option value="en"' + (State.settings.lang === "en" ? " selected" : "") + '>EN</option>' +
        '</select>' +
        '<button data-theme class="p-2 rounded-full hover:bg-surface-gray dark:hover:bg-background-dark">' + (State.settings.theme === "dark" ? ICONS.sun : ICONS.moon) + '</button>' +
        '<a href="#/notifications" class="relative p-2 rounded-full hover:bg-surface-gray dark:hover:bg-background-dark">' + ICONS.bell + (unread > 0 ? '<span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-red-500"></span>' : '') + '</a>' +
        '<a href="#/profile" class="w-9 h-9 rounded-full brand-gradient text-white flex items-center justify-center text-sm font-semibold">' + (acc ? escapeHtml(acc.email[0].toUpperCase()) : "A") + '</a>' +
      '</div>' +
    '</header>';

  return '<div class="flex min-h-screen">' +
    (sidebarOpen ? '<div data-overlay class="fixed inset-0 z-40 bg-black/40 lg:hidden"></div>' : '') +
    sidebar +
    '<div class="flex-1 min-w-0 flex flex-col">' + topbar +
      '<main id="page-content" class="flex-1 p-4 sm:p-6 lg:p-10 max-w-[1400px] w-full mx-auto"></main>' +
    '</div>' +
  '</div>';
}

function bindShell(current) {
  document.querySelectorAll("[data-nav]").forEach(a => a.addEventListener("click", () => { sidebarOpen = false; }));
  const ob = document.querySelector("[data-open-sidebar]");
  if (ob) ob.addEventListener("click", () => { sidebarOpen = true; render(); });
  const cb = document.querySelector("[data-close-sidebar]");
  if (cb) cb.addEventListener("click", () => { sidebarOpen = false; render(); });
  const ov = document.querySelector("[data-overlay]");
  if (ov) ov.addEventListener("click", () => { sidebarOpen = false; render(); });
  const tb = document.querySelector("[data-theme]");
  if (tb) tb.addEventListener("click", toggleTheme);
  const lg = document.querySelector("[data-lang]");
  if (lg) lg.addEventListener("change", e => setLang(e.target.value));
  const lo = document.querySelector("[data-logout]");
  if (lo) lo.addEventListener("click", () => doLogout());
  const gs = document.getElementById("global-search");
  if (gs) gs.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const q = e.target.value.trim().toLowerCase();
      const hit = NAV.flatMap(g => g.items).find(it => t(it.label).toLowerCase().includes(q) || it.id.includes(q));
      if (hit) { location.hash = "#/" + hit.id; } else { toast("Nincs találat: " + q, "warning"); }
    }
  });
}

function doLogout() {
  confirmDialog(t("logout"), "Biztosan kijelentkezik a konzolból?", () => {
    addLog("auth", "Kijelentkezés", "");
    State.session = { loggedIn: false };
    toast("Sikeresen kijelentkezett", "success");
    location.hash = "#/login";
    render();
  });
}
</script>

Pages.registerInit = function() {
  bindPublicNav();
  const f = document.getElementById("register-form");
  f.addEventListener("submit", e => {
    e.preventDefault();
    const email = document.getElementById("reg-email").value.trim();
    const p1 = document.getElementById("reg-password").value;
    const p2 = document.getElementById("reg-password2").value;
    const terms = document.getElementById("reg-terms").checked;
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { toast("Érvénytelen e-mail cím", "error"); return; }
    if (p1.length < 8) { toast("A jelszónak legalább 8 karakteresnek kell lennie", "error"); return; }
    if (p1 !== p2) { toast("A jelszavak nem egyeznek", "error"); return; }
    if (!terms) { toast("Fogadja el a feltételeket", "warning"); return; }
    const tenantId = genTenantId();
    State.account = { email: email, tenantId: tenantId, createdAt: Date.now(), name: email.split("@")[0] };
    const key = genApiKey();
    State.apikeys = [{ id: uid("key"), name: "Alapértelmezett kulcs", key: key, createdAt: Date.now(), status: "active", lastUsed: null, scope: "full" }];
    State.tenant = { id: tenantId, name: "default", status: "active", region: "eu-central-1", createdAt: Date.now(), activity: Date.now() };
    State.session = { loggedIn: true, apiKey: key, loginAt: Date.now() };
    const s = State.settings; s.onboarded = false; State.settings = s;
    addLog("auth", "Új fiók regisztrálva", email);
    toast("Fiók sikeresen létrehozva!", "success");
    location.hash = "#/dashboard";
    render();
  });
};

Pages.login = function() {
  const form =
    '<form id="login-form" class="space-y-1">' +
      field("API kulcs", '<input id="login-key" type="text" required class="' + inputCls() + ' font-mono" placeholder="agdb_sk_...">', "Jelentkezzen be a tenant API kulcsával.") +
      '<button type="submit" class="w-full py-3 rounded-full bg-primary-blue text-white font-semibold hover:opacity-90">' + t("login") + '</button>' +
    '</form>' +
    '<div class="mt-4 p-4 rounded-2xl bg-surface-gray dark:bg-background-dark border border-border-light dark:border-border-dark text-sm font-geist text-text-medium dark:text-text-medium-dark flex gap-2">' + ICONS.info + '<span>Nincs még API kulcsa? A regisztrációkor automatikusan kap egyet.</span></div>';
  const footer = '<p class="text-center text-sm font-geist text-text-medium dark:text-text-medium-dark mt-6">Nincs még fiókja? <a href="#/register" class="text-primary-blue font-medium hover:underline">' + t("register") + '</a></p>';
  return authShell("Bejelentkezés API kulccsal", "Adja meg a tenant API kulcsát a folytatáshoz.", form, footer);
};
Pages.loginInit = function() {
  bindPublicNav();
  const f = document.getElementById("login-form");
  f.addEventListener("submit", e => {
    e.preventDefault();
    const key = document.getElementById("login-key").value.trim();
    if (!key.startsWith("agdb_sk_")) { toast("Érvénytelen kulcs formátum (agdb_sk_...)", "error"); return; }
    let keys = State.apikeys;
    let acc = State.account;
    if (!acc) {
      const tenantId = genTenantId();
      acc = { email: "developer@agdb.cloud", tenantId: tenantId, createdAt: Date.now(), name: "developer" };
      State.account = acc;
      State.tenant = { id: tenantId, name: "default", status: "active", region: "eu-central-1", createdAt: Date.now(), activity: Date.now() };
      keys = [{ id: uid("key"), name: "Bejelentkezési kulcs", key: key, createdAt: Date.now(), status: "active", lastUsed: Date.now(), scope: "full" }];
      State.apikeys = keys;
    }
    const found = keys.find(k => k.key === key);
    if (found) {
      if (found.status !== "active") { toast("Ez a kulcs vissza lett vonva", "error"); return; }
      found.lastUsed = Date.now(); State.apikeys = keys;
    } else {
      keys.push({ id: uid("key"), name: "Külső kulcs", key: key, createdAt: Date.now(), status: "active", lastUsed: Date.now(), scope: "full" });
      State.apikeys = keys;
    }
    State.session = { loggedIn: true, apiKey: key, loginAt: Date.now() };
    addLog("auth", "Sikeres bejelentkezés API kulccsal", key.slice(0, 16) + "…");
    toast("Üdvözöljük újra!", "success");
    location.hash = "#/dashboard";
    render();
  });
};
</script>

      (s.done ? badge("Kész", "green") : '<button data-onb-action="' + s.action + '" class="px-4 py-2 rounded-full bg-primary-blue text-white text-sm font-medium">Indítás</button>') +
    '</div>'
  ).join("");
  const startBtn = cont.querySelector("[data-onb-action='sandbox']");
  if (startBtn) startBtn.addEventListener("click", () => {
    const sb = State.sandbox; sb.status = "running"; sb.startedAt = Date.now(); State.sandbox = sb;
    addLog("ops", "Sandbox elindítva az onboarding során", "");
    toast("Sandbox elindítva", "success");
    Pages.onboardingInit();
  });
  const finish = () => {
    const s = State.settings; s.onboarded = true; State.settings = s;
    pushNotification("Onboarding kész", "Sikeresen befejezte a beállítást.", "success");
    location.hash = "#/dashboard"; render();
  };
  document.getElementById("onb-finish").addEventListener("click", finish);
  document.getElementById("onb-skip").addEventListener("click", finish);
};
</script>

<script>

        '<div class="flex items-center gap-3 mb-5">' +

          '<span class="font-medium">' + (sb.status === "running" ? "Fut" : "Leállítva") + '</span>' +
        '</div>' +
        resourceBar("CPU", m.cpu, "%") + resourceBar("RAM", m.ram, "%") + resourceBar("PID", Math.round(m.pids / 2), "%") +
        '<a href="#/sandbox" class="mt-5 inline-flex items-center gap-2 text-sm font-medium text-primary-blue hover:underline">Sandbox kezelése →</a>' +
      '</div>' +
    '</div>' +
    '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">' +
      '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
        '<div class="flex items-center justify-between mb-4"><h3 class="font-semibold text-lg">Tenant információ</h3><a href="#/tenant" class="text-sm text-primary-blue hover:underline">Részletek</a></div>' +
        kvRow("Tenant ID", '<span class="font-mono text-sm">' + escapeHtml(acc.tenantId.slice(0, 18)) + '…</span>') +
        kvRow("Régió", State.tenant ? State.tenant.region : "eu-central-1") +
        kvRow("Állapot", badge("Aktív", "green")) +
        kvRow("Csomag", State.billing.plan.toUpperCase()) +
      '</div>' +
      '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
        '<div class="flex items-center justify-between mb-4"><h3 class="font-semibold text-lg">Gyors műveletek</h3></div>' +
        '<div class="grid grid-cols-2 gap-3">' +
          quickAction("key", "API kulcsok", "apikeys") + quickAction("terminal", "Query", "query") +
          quickAction("database", "Import", "data") + quickAction("book", "Dokumentáció", "docs") +
        '</div>' +
      '</div>' +
    '</div>';
};
function resourceBar(label, pct, unit) {
  const color = pct > 80 ? "bg-red-500" : pct > 60 ? "bg-amber-500" : "bg-primary-blue";
  return '<div class="mb-3"><div class="flex justify-between text-sm font-geist mb-1"><span class="text-text-medium dark:text-text-medium-dark">' + label + '</span><span class="font-medium">' + pct + unit + '</span></div>' +
    '<div class="h-2 rounded-full bg-surface-gray dark:bg-background-dark overflow-hidden"><div class="h-full rounded-full ' + color + '" style="width:' + pct + '%"></div></div></div>';
}
function kvRow(k, v) {
  return '<div class="flex items-center justify-between py-2.5 border-b border-border-light dark:border-border-dark last:border-0"><span class="text-sm font-geist text-text-medium dark:text-text-medium-dark">' + escapeHtml(k) + '</span><span class="text-sm font-medium">' + v + '</span></div>';
}
function quickAction(icon, label, route) {
  return '<a href="#/' + route + '" class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-surface-gray dark:bg-background-dark hover:bg-primary-blue/10 hover:text-primary-blue transition text-center"><span>' + ICONS[icon] + '</span><span class="text-sm font-geist font-medium">' + escapeHtml(label) + '</span></a>';
}
Pages.dashboardInit = function() {
  const r = document.querySelector("[data-dash-refresh]");
  if (r) r.addEventListener("click", () => {
    State.metrics = null; ensureMetrics();
    toast("Adatok frissítve", "success"); render();

};
</script>

<script>
Pages.apikeys = function() {
  const keys = State.apikeys;
  const rows = keys.map(k => {
    const masked = k.key.slice(0, 12) + "•".repeat(16) + k.key.slice(-4);
    return '<div class="bg-white dark:bg-surface-dark rounded-2xl border border-border-light dark:border-border-dark p-5">' +
      '<div class="flex flex-wrap items-start justify-between gap-4">' +
        '<div class="min-w-0">' +
          '<div class="flex items-center gap-3 mb-2"><h3 class="font-semibold">' + escapeHtml(k.name) + '</h3>' + (k.status === "active" ? badge("Aktív", "green") : badge("Visszavonva", "red")) + badge(k.scope || "full", "blue") + '</div>' +
          '<div class="flex items-center gap-2 mb-2"><code data-key-display="' + k.id + '" class="font-mono text-sm text-text-medium dark:text-text-medium-dark break-all">' + escapeHtml(masked) + '</code>' +
            '<button data-toggle-key="' + k.id + '" class="text-xs px-2 py-1 rounded-full bg-surface-gray dark:bg-background-dark hover:opacity-80 font-geist">Mutat</button>' +
            '<button data-copy-key="' + k.id + '" class="p-1.5 rounded-full bg-surface-gray dark:bg-background-dark hover:opacity-80">' + ICONS.copy + '</button></div>' +
          '<div class="text-xs font-geist text-text-medium dark:text-text-medium-dark">Létrehozva: ' + fmtDate(k.createdAt) + ' · Utolsó használat: ' + (k.lastUsed ? fmtRelative(k.lastUsed) : "soha") + '</div>' +
        '</div>' +
        '<div class="flex flex-wrap gap-2">' +
          '<button data-regen-key="' + k.id + '" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-full text-sm font-geist bg-surface-gray dark:bg-background-dark hover:opacity-80">' + ICONS.refresh + 'Regenerálás</button>' +
          (k.status === "active" ? '<button data-revoke-key="' + k.id + '" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-full text-sm font-geist text-red-600 bg-red-50 dark:bg-red-500/10 hover:opacity-80">' + ICONS.x + 'Visszavonás</button>' : '') +
          '<button data-delete-key="' + k.id + '" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-full text-sm font-geist bg-surface-gray dark:bg-background-dark hover:opacity-80">' + ICONS.trash + '</button>' +
        '</div>' +
      '</div></div>';
  }).join("");

  return sectionHeader(t("nav_apikeys"), "Hozzon létre, kezeljen és vonjon vissza API kulcsokat a tenanthoz.",
      btnPrimary(ICONS.plus + " Új kulcs generálása", 'data-new-key')) +
    '<div class="mb-6 p-4 rounded-2xl bg-amber-50 dark:bg-amber-500/10 border border-amber-200 dark:border-amber-500/30 flex gap-3 text-sm font-geist text-amber-800 dark:text-amber-200">' + ICONS.warn + '<span><strong>Figyelem:</strong> A teljes API kulcs csak generáláskor jelenik meg. Tárolja biztonságosan — elvesztés esetén regenerálni kell.</span></div>' +
    (keys.length ? '<div class="space-y-4">' + rows + '</div>' : emptyState(ICONS.key, "Nincs API kulcs", "Generáljon egy kulcsot az API eléréséhez.", btnPrimary(ICONS.plus + " Kulcs generálása", 'data-new-key-empty')));
};
Pages.apikeysInit = function() {
  const create = () => {
    const key = genApiKey();
    const list = State.apikeys;
    list.unshift({ id: uid("key"), name: "Kulcs " + (list.length + 1), key: key, createdAt: Date.now(), status: "active", lastUsed: null, scope: "full" });
    State.apikeys = list;
    addLog("security", "Új API kulcs generálva", key.slice(0, 16) + "…");
    pushNotification("Új API kulcs", "Egy új API kulcs lett létrehozva.", "info");
    showKeyModal(key);
    render();
  };
  const nk = document.querySelector("[data-new-key]"); if (nk) nk.addEventListener("click", create);
  const nke = document.querySelector("[data-new-key-empty]"); if (nke) nke.addEventListener("click", create);

  document.querySelectorAll("[data-toggle-key]").forEach(b => b.addEventListener("click", () => {
    const id = b.getAttribute("data-toggle-key");
    const k = State.apikeys.find(x => x.id === id);
    const disp = document.querySelector('[data-key-display="' + id + '"]');
    if (b.textContent === "Mutat") { disp.textContent = k.key; b.textContent = "Elrejt"; }
    else { disp.textContent = k.key.slice(0, 12) + "•".repeat(16) + k.key.slice(-4); b.textContent = "Mutat"; }
  }));
  document.querySelectorAll("[data-copy-key]").forEach(b => b.addEventListener("click", () => {
    const k = State.apikeys.find(x => x.id === b.getAttribute("data-copy-key"));
    copyText(k.key, "API kulcs");
  }));
  document.querySelectorAll("[data-regen-key]").forEach(b => b.addEventListener("click", () => {
    const id = b.getAttribute("data-regen-key");
    confirmDialog("API kulcs regenerálása", "A régi kulcs azonnal érvénytelenné válik. Folytatja?", () => {
      const list = State.apikeys; const k = list.find(x => x.id === id);
      k.key = genApiKey(); k.createdAt = Date.now(); k.status = "active"; k.lastUsed = null;
      State.apikeys = list;
      addLog("security", "API kulcs regenerálva", k.key.slice(0, 16) + "…");
      showKeyModal(k.key); render();
    }, { danger: true, okLabel: "Regenerálás" });
  }));
  document.querySelectorAll("[data-revoke-key]").forEach(b => b.addEventListener("click", () => {
    const id = b.getAttribute("data-revoke-key");
    confirmDialog("API kulcs visszavonása", "A kulcs visszavonása után az nem használható többé.", () => {
      const list = State.apikeys; const k = list.find(x => x.id === id); k.status = "revoked";
      State.apikeys = list; addLog("security", "API kulcs visszavonva", k.key.slice(0, 16) + "…");
      toast("Kulcs visszavonva", "success"); render();
    }, { danger: true, okLabel: "Visszavonás" });
  }));
  document.querySelectorAll("[data-delete-key]").forEach(b => b.addEventListener("click", () => {
    const id = b.getAttribute("data-delete-key");
    confirmDialog("Kulcs törlése", "Véglegesen törli ezt a kulcsbejegyzést?", () => {
      State.apikeys = State.apikeys.filter(x => x.id !== id);
      toast("Kulcs törölve", "success"); render();
    }, { danger: true, okLabel: t("delete") });
  }));
};
function showKeyModal(key) {
  modal("API kulcs létrehozva", 
    '<div class="p-4 rounded-2xl bg-amber-50 dark:bg-amber-500/10 border border-amber-200 dark:border-amber-500/30 flex gap-3 text-sm font-geist text-amber-800 dark:text-amber-200 mb-5">' + ICONS.warn + '<span>Másolja ki most! Ez a teljes kulcs többé nem jelenik meg.</span></div>' +
    '<div class="p-4 rounded-xl bg-[#0f172a] text-[#e2e8f0] font-mono text-sm break-all mb-4">' + escapeHtml(key) + '</div>' +
    '<button id="modal-copy-key" class="w-full py-3 rounded-full bg-primary-blue text-white font-semibold hover:opacity-90 inline-flex items-center justify-center gap-2">' + ICONS.copy + 'Másolás a vágólapra</button>',
    { onMount(wrap) { wrap.querySelector("#modal-copy-key").addEventListener("click", () => copyText(key, "API kulcs")); } });
}
</script>

<script>
Pages.sandbox = function() {

<script>
function runQuery(q) {
  let records = State.db.records.slice();
  const errors = [];
  if (q.where && Array.isArray(q.where)) {
    for (const cond of q.where) {
      if (!cond.field) continue;
      records = records.filter(r => {
        const v = r[cond.field];
        const target = cond.value;
        switch (cond.op) {
          case "==": return String(v) === String(target);
          case "!=": return String(v) !== String(target);
          case ">": return Number(v) > Number(target);
          case "<": return Number(v) < Number(target);
          case ">=": return Number(v) >= Number(target);
          case "<=": return Number(v) <= Number(target);
          case "contains": return v !== undefined && String(v).toLowerCase().includes(String(target).toLowerCase());
          default: return true;
        }
      });
    }
  }
  if (q.search && q.search.trim()) {
    const term = q.search.trim().toLowerCase();
    records = records.map(r => {
      const hay = (r.title + " " + r.content + " " + (r.tags ? r.tags.join(" ") : "")).toLowerCase();
      let rel = 0; term.split(/\s+/).forEach(w => { if (hay.includes(w)) rel += 1; });
      return { rec: r, rel: rel + (r.score || 0) };
    }).filter(x => x.rel > 0).sort((a, b) => b.rel - a.rel).map(x => x.rec);
  }
  if (q.orderBy && q.orderBy.field) {
    const f = q.orderBy.field; const dir = q.orderBy.dir === "asc" ? 1 : -1;
    records.sort((a, b) => { const av = a[f], bv = b[f]; if (av === bv) return 0; return (av > bv ? 1 : -1) * dir; });
  }
  if (q.topK && q.topK > 0) records = records.slice(0, q.topK);
  if (q.limit && q.limit > 0) records = records.slice(0, q.limit);
  if (q.select && q.select.length) {
    records = records.map(r => { const o = {}; q.select.forEach(f => { if (r[f] !== undefined) o[f] = r[f]; }); return o; });
  }
  return { rows: records, errors: errors };
}

function validateQuery(q) {
  const errs = [];
  if (typeof q !== "object" || q === null) { errs.push("A query objektumnak kell lennie."); return errs; }
  if (q.where && !Array.isArray(q.where)) errs.push("A 'where' tömb kell legyen.");
  if (q.where) q.where.forEach((c, i) => {
    if (!c.field) errs.push("where[" + i + "]: hiányzó 'field'.");
    if (c.op && !["==", "!=", ">", "<", ">=", "<=", "contains"].includes(c.op)) errs.push("where[" + i + "]: érvénytelen operátor '" + c.op + "'.");
  });
  if (q.limit !== undefined && (typeof q.limit !== "number" || q.limit < 0)) errs.push("A 'limit' nem negatív szám kell legyen.");
  if (q.topK !== undefined && (typeof q.topK !== "number" || q.topK < 0)) errs.push("A 'topK' nem negatív szám kell legyen.");
  if (q.orderBy && q.orderBy.dir && !["asc", "desc"].includes(q.orderBy.dir)) errs.push("Az 'orderBy.dir' csak 'asc' vagy 'desc' lehet.");
  return errs;
}

function collectVisualQuery() {
  const get = id => { const e = document.getElementById(id); return e ? e.value : ""; };
  const where = [];
  document.querySelectorAll("#qb-where [data-where-row]").forEach(row => {
    const f = row.querySelector("[data-wf]").value.trim();
    const o = row.querySelector("[data-wo]").value;
    const v = row.querySelector("[data-wv]").value;
    if (f) where.push({ field: f, op: o, value: isNaN(Number(v)) || v === "" ? v : Number(v) });
  });
  currentQueryObj = {
    from: get("qb-from") || "documents",
    search: get("qb-search"),
    where: where,
    orderBy: get("qb-orderfield") ? { field: get("qb-orderfield"), dir: get("qb-orderdir") } : null,
    limit: parseInt(get("qb-limit")) || 0,
    topK: parseInt(get("qb-topk")) || 0,
    select: []
  };
  return currentQueryObj;
}

  } else {
    const cols = Array.from(result.rows.reduce((set, r) => { Object.keys(r).forEach(k => set.add(k)); return set; }, new Set()));
    cont.innerHTML = header + '<div class="overflow-x-auto max-h-[460px] overflow-y-auto"><table class="w-full text-sm font-geist"><thead><tr class="text-left border-b border-border-light dark:border-border-dark sticky top-0 bg-white dark:bg-surface-dark">' +

Pages.queryInit = function() {
  renderWhereRows();
  const od = document.getElementById("qb-orderdir"); if (od && currentQueryObj.orderBy) od.value = currentQueryObj.orderBy.dir;
  const addW = document.getElementById("qb-add-where");
  if (addW) addW.addEventListener("click", () => { collectVisualQuery(); currentQueryObj.where.push({ field: "", op: "==", value: "" }); renderWhereRows(); });

  document.querySelectorAll("[data-qb-tab]").forEach(b => b.addEventListener("click", () => {
    const tab = b.getAttribute("data-qb-tab");
    document.querySelectorAll("[data-qb-tab]").forEach(x => x.className = "px-3 py-1.5 rounded-full text-xs font-geist bg-surface-gray dark:bg-background-dark");
    b.className = "px-3 py-1.5 rounded-full text-xs font-geist bg-primary-blue text-white";
    if (tab === "json") {
      collectVisualQuery();
      document.getElementById("qb-visual").classList.add("hidden");
      document.getElementById("qb-json").classList.remove("hidden");
      document.getElementById("qb-json-text").value = JSON.stringify(currentQueryObj, null, 2);
    } else {
      document.getElementById("qb-json").classList.add("hidden");
      document.getElementById("qb-visual").classList.remove("hidden");
    }
  }));

  const getQuery = () => {
    const jsonPanel = document.getElementById("qb-json");
    if (jsonPanel && !jsonPanel.classList.contains("hidden")) {
      try { currentQueryObj = JSON.parse(document.getElementById("qb-json-text").value); return currentQueryObj; }
      catch (e) { toast("Érvénytelen JSON: " + e.message, "error"); return null; }
    }
    return collectVisualQuery();
  };

  const v = document.querySelector("[data-validate]");
  if (v) v.addEventListener("click", () => {
    const q = getQuery(); if (!q) return;
    const errs = validateQuery(q);
    if (errs.length) { toast(errs.length + " validációs hiba", "error"); errs.forEach(e => toast(e, "warning")); }
    else toast("A query érvényes", "success");
  });

  const run = document.querySelector("[data-run]");
  if (run) run.addEventListener("click", () => {
    if (State.sandbox.status !== "running") { toast("Indítsa el a sandboxot a futtatáshoz", "warning"); return; }
    const q = getQuery(); if (!q) return;
    const errs = validateQuery(q);
    if (errs.length) { toast("Javítsa a validációs hibákat", "error"); return; }
    const cont = document.getElementById("query-result");
    cont.innerHTML = loadingBlock("Lekérdezés futtatása...");
    const start = performance.now();
    const timeout = 4000;
    let finished = false;
    const timer = setTimeout(() => { if (!finished) { finished = true; cont.innerHTML = '<div class="p-4 rounded-xl bg-red-50 dark:bg-red-500/10 text-red-600 text-sm font-geist flex gap-2">' + ICONS.warn + 'Query timeout (' + timeout + ' ms túllépve)</div>'; toast("Query timeout", "error"); } }, timeout);
    setTimeout(() => {
      if (finished) return; finished = true; clearTimeout(timer);
      const result = runQuery(q);
      const ms = Math.max(1, Math.round(performance.now() - start));
      renderQueryResult(result, ms);
      const h = State.history;
      h.unshift({ id: uid("h"), query: q, rows: result.rows.length, ms: ms, ts: Date.now() });
      if (h.length > 100) h.length = 100; State.history = h;
      addLog("query", "Query futtatva a " + (q.from || "documents") + " kollekción", "rows: " + result.rows.length + " · " + ms + "ms");
    }, 600);
  });

  document.querySelectorAll("[data-view]").forEach(b => b.addEventListener("click", () => {
    qResultView = b.getAttribute("data-view");
    document.querySelectorAll("[data-view]").forEach(x => x.className = "px-3 py-1.5 rounded-full text-xs font-geist " + (x === b ? "bg-primary-blue text-white" : "bg-surface-gray dark:bg-background-dark"));
    const lastRun = State.history[0];
    if (lastRun) renderQueryResult(runQuery(lastRun.query), lastRun.ms);
  }));

  const sq = document.querySelector("[data-save-query]");
  if (sq) sq.addEventListener("click", () => {
    const q = getQuery(); if (!q) return;
    modal("Query mentése", field("Név", '<input id="save-q-name" class="' + inputCls() + '" placeholder="pl. Engineering dokumentumok">') +

      { onMount(wrap, close) { wrap.querySelector("#save-q-confirm").addEventListener("click", () => {

Pages.data = function() {

        '<div class="flex items-center gap-3 mb-4"><span class="w-10 h-10 rounded-xl bg-primary-blue/10 text-primary-blue flex items-center justify-center">' + ICONS.upload + '</span><h3 class="font-semibold text-lg">Adat import</h3></div>' +
        '<p class="text-sm text-text-medium dark:text-text-medium-dark font-geist mb-4">Illessze be a JSON tömböt vagy töltsön fel egy fájlt. Minden objektum egy dokumentum.</p>' +
        '<textarea id="import-text" rows="10" class="' + inputCls() + ' font-mono resize-y mb-3" placeholder=\'[{"id":"doc_x","title":"...","content":"..."}]\'></textarea>' +

          '<label class="inline-flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-gray dark:bg-background-dark text-sm font-medium cursor-pointer hover:opacity-80">' + ICONS.upload + 'Fájl<input id="import-file" type="file" accept=".json,.ndjson,.txt" class="hidden"></label>' +
          '<button id="import-mode" class="px-4 py-2.5 rounded-full bg-surface-gray dark:bg-background-dark text-sm font-medium">Mód: hozzáfűzés</button>' +
          '<button id="import-go" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary-blue text-white text-sm font-medium">' + ICONS.upload + 'Importálás</button>' +
        '</div>' +
      '</div>' +
      '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
        '<div class="flex items-center gap-3 mb-4"><span class="w-10 h-10 rounded-xl bg-emerald-500/10 text-emerald-500 flex items-center justify-center">' + ICONS.download + '</span><h3 class="font-semibold text-lg">Adat export</h3></div>' +
        '<p class="text-sm text-text-medium dark:text-text-medium-dark font-geist mb-4">A jelenlegi kollekció ' + State.db.records.length + ' rekordot tartalmaz.</p>' +
        '<div class="flex flex-wrap gap-3 mb-4">' +
          '<button id="export-json" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary-blue text-white text-sm font-medium">' + ICONS.download + 'Export JSON</button>' +
          '<button id="export-csv" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-surface-gray dark:bg-background-dark text-sm font-medium">' + ICONS.download + 'Export CSV</button>' +
        '</div>' +
        '<pre class="p-3 rounded-xl bg-surface-gray dark:bg-background-dark text-xs overflow-x-auto max-h-60 overflow-y-auto"><code>' + escapeHtml(JSON.stringify(State.db.records.slice(0, 2), null, 2)) + '</code></pre>' +
      '</div>' +
    '</div>';
};
Pages.dataInit = function() {
  let mode = "append";
  const mb = document.getElementById("import-mode");
  mb.addEventListener("click", () => { mode = mode === "append" ? "replace" : "append"; mb.textContent = "Mód: " + (mode === "append" ? "hozzáfűzés" : "csere"); });
  document.getElementById("import-file").addEventListener("change", e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => { document.getElementById("import-text").value = reader.result; toast("Fájl betöltve", "info"); };
    reader.readAsText(f);
  });
  document.getElementById("import-go").addEventListener("click", () => {
    const txt = document.getElementById("import-text").value.trim();
    if (!txt) { toast("Nincs importálandó adat", "warning"); return; }
    let data;
    try { data = JSON.parse(txt); }
    catch (e) {
      try { data = txt.split("\n").filter(l => l.trim()).map(l => JSON.parse(l)); }
      catch (e2) { toast("Érvénytelen JSON: " + e.message, "error"); return; }
    }
    if (!Array.isArray(data)) data = [data];
    const db = State.db;
    data.forEach(d => { if (!d.id) d.id = uid("doc"); });
    db.records = mode === "replace" ? data : db.records.concat(data);
    State.db = db;
    addLog("data", "Adat import (" + mode + ")", data.length + " rekord");
    toast(data.length + " rekord importálva", "success"); render();
  });
  const download = (content, filename, type) => {
    const blob = new Blob([content], { type: type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url); toast("Export elkészült: " + filename, "success");
    addLog("data", "Adat export", filename);
  };
  document.getElementById("export-json").addEventListener("click", () => download(JSON.stringify(State.db.records, null, 2), "agdb-export.json", "application/json"));
  document.getElementById("export-csv").addEventListener("click", () => {
    const recs = State.db.records; if (!recs.length) { toast("Nincs exportálható adat", "warning"); return; }
    const cols = Array.from(recs.reduce((s, r) => { Object.keys(r).forEach(k => s.add(k)); return s; }, new Set()));
    const csv = [cols.join(",")].concat(recs.map(r => cols.map(c => { const v = r[c]; const s = typeof v === "object" ? JSON.stringify(v) : (v !== undefined ? String(v) : ""); return '"' + s.replace(/"/g, '""') + '"'; }).join(","))).join("\n");
    download(csv, "agdb-export.csv", "text/csv");
  });
};
</script>

<script>
Pages.analytics = function() {
  const m = ensureMetrics();
  const totalReq = m.series.reduce((a, s) => a + s.requests, 0);
  const totalErr = m.series.reduce((a, s) => a + s.errors, 0);
  const maxLat = Math.max.apply(null, m.series.map(s => s.latency));
  const latLine = m.series.map((s, i) => { const x = (i / (m.series.length - 1)) * 100; const y = 100 - (s.latency / maxLat) * 90; return x + "," + y; }).join(" ");
  return sectionHeader(t("nav_analytics"), "API használati analitika, válaszidő és hibaarány.") +
    '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-6">' +
      statCard("Kérések (24h)", totalReq.toLocaleString("hu-HU"), "Összes hívás", ICONS.chart) +
      statCard("Átlag válaszidő", m.avgLatency + " ms", "p95: " + m.p95Latency + " ms", ICONS.clock, "text-emerald-500") +
      statCard("Hibaarány", m.errorRate + "%", totalErr + " hiba", ICONS.warn, "text-red-500") +
      statCard("Rate limit", "1000 / perc", State.billing.plan.toUpperCase() + " csomag", ICONS.shield, "text-amber-500") +
    '</div>' +
    '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">' +
      '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
        '<h3 class="font-semibold text-lg mb-5">Válaszidő trend (24h)</h3>' +
        '<svg viewBox="0 0 100 100" preserveAspectRatio="none" class="w-full h-40"><polyline fill="none" stroke="#3b82f6" stroke-width="1.5" points="' + latLine + '"/><polyline fill="rgba(59,130,246,0.1)" stroke="none" points="0,100 ' + latLine + ' 100,100"/></svg>' +
        '<div class="flex justify-between text-xs font-geist text-text-medium dark:text-text-medium-dark mt-2"><span>p50: ' + m.avgLatency + 'ms</span><span>p95: ' + m.p95Latency + 'ms</span><span>p99: ' + m.p99Latency + 'ms</span></div>' +
      '</div>' +
      '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
        '<h3 class="font-semibold text-lg mb-5">Végpontok szerinti megoszlás</h3>' +
        '<div class="space-y-3">' +
          endpointBar("/query", 62) + endpointBar("/search", 24) + endpointBar("/databases", 9) + endpointBar("/health", 5) +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
      '<h3 class="font-semibold text-lg mb-5">Használati limitek</h3>' +
      '<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">' +
        usageLimit("API hívások / hó", totalReq * 28, 1000000) +

        usageLimit("Egyidejű kapcsolat", 12, 50) +
      '</div>' +
    '</div>';
};
function endpointBar(name, pct) {
  return '<div><div class="flex justify-between text-sm font-geist mb-1"><span class="font-mono">' + escapeHtml(name) + '</span><span class="text-text-medium dark:text-text-medium-dark">' + pct + '%</span></div><div class="h-2 rounded-full bg-surface-gray dark:bg-background-dark overflow-hidden"><div class="h-full rounded-full bg-primary-blue" style="width:' + pct + '%"></div></div></div>';

function usageLimit(label, used, max) {

let auditFilter = "all", auditSearch = "", auditPage = 1, auditSort = "desc";
Pages.audit = function() {

          [["all", "Minden típus"], ["auth", "Hitelesítés"], ["security", "Biztonság"], ["access", "Hozzáférés"], ["query", "Lekérdezés"], ["data", "Adat"], ["ops", "Művelet"]].map(o => '<option value="' + o[0] + '"' + (auditFilter === o[0] ? " selected" : "") + '>' + o[1] + '</option>').join("") + '</select>' +

          '<option value="desc"' + (auditSort === "desc" ? " selected" : "") + '>Legújabb elöl</option><option value="asc"' + (auditSort === "asc" ? " selected" : "") + '>Legrégebbi elöl</option></select>' +
      '</div>' +
    '</div>' +
    '<div id="audit-list"></div>';
};
Pages.auditInit = function() {
  const renderList = () => {
    let logs = State.logs.slice();
    if (auditFilter !== "all") logs = logs.filter(l => l.type === auditFilter);
    if (auditSearch.trim()) { const q = auditSearch.toLowerCase(); logs = logs.filter(l => (l.message + " " + l.meta).toLowerCase().includes(q)); }
    logs.sort((a, b) => auditSort === "desc" ? b.ts - a.ts : a.ts - b.ts);
    const perPage = 10; const pages = Math.max(1, Math.ceil(logs.length / perPage));
    if (auditPage > pages) auditPage = pages;
    const slice = logs.slice((auditPage - 1) * perPage, auditPage * perPage);
    const typeColor = { auth: "blue", security: "red", access: "gray", query: "green", data: "amber", ops: "blue" };
    const cont = document.getElementById("audit-list");
    if (!slice.length) { cont.innerHTML = emptyState(ICONS.shield, "Nincs naplóbejegyzés", "Nincs a szűrőnek megfelelő esemény.", ""); return; }
    cont.innerHTML = '<div class="bg-white dark:bg-surface-dark rounded-2xl border border-border-light dark:border-border-dark divide-y divide-border-light dark:divide-border-dark">' +
      slice.map(l => '<div class="p-4 flex items-start gap-4">' +
        '<div class="shrink-0">' + badge(l.type, typeColor[l.type] || "gray") + '</div>' +
        '<div class="flex-1 min-w-0"><div class="font-medium text-sm">' + escapeHtml(l.message) + '</div>' +
          (l.meta ? '<div class="text-xs font-geist text-text-medium dark:text-text-medium-dark mt-0.5 font-mono">' + escapeHtml(l.meta) + '</div>' : '') + '</div>' +
        '<div class="text-right shrink-0"><div class="text-xs font-geist text-text-medium dark:text-text-medium-dark">' + fmtDate(l.ts) + '</div><div class="text-xs font-geist text-text-medium dark:text-text-medium-dark font-mono">' + escapeHtml(l.ip) + '</div></div>' +
      '</div>').join("") + '</div>' +
      '<div class="flex items-center justify-between mt-4 text-sm font-geist"><span class="text-text-medium dark:text-text-medium-dark">' + logs.length + ' bejegyzés · ' + auditPage + '/' + pages + ' oldal</span>' +
        '<div class="flex gap-2"><button data-page-prev ' + (auditPage <= 1 ? "disabled" : "") + ' class="px-4 py-2 rounded-full bg-surface-gray dark:bg-background-dark disabled:opacity-40">Előző</button><button data-page-next ' + (auditPage >= pages ? "disabled" : "") + ' class="px-4 py-2 rounded-full bg-surface-gray dark:bg-background-dark disabled:opacity-40">Következő</button></div></div>';
    const p = cont.querySelector("[data-page-prev]"); if (p) p.addEventListener("click", () => { auditPage--; renderList(); });
    const n = cont.querySelector("[data-page-next]"); if (n) n.addEventListener("click", () => { auditPage++; renderList(); });
  };
  document.getElementById("audit-search").addEventListener("input", e => { auditSearch = e.target.value; auditPage = 1; renderList(); });
  document.getElementById("audit-filter").addEventListener("change", e => { auditFilter = e.target.value; auditPage = 1; renderList(); });
  document.getElementById("audit-sort").addEventListener("change", e => { auditSort = e.target.value; renderList(); });
  renderList();
};
</script>

<script>
const CODE_SAMPLES = {
  javascript: 'const res = await fetch("' + API_BASE + '/databases/documents/query", {\n  method: "POST",\n  headers: {\n    "Authorization": "Bearer agdb_sk_YOUR_KEY",\n    "Content-Type": "application/json"\n  },\n  body: JSON.stringify({ search: "vector index", topK: 5 })\n});\nconst data = await res.json();\nconsole.log(data.rows);',
  typescript: 'interface QueryResponse {\n  rows: Record<string, unknown>[];\n  took: number;\n}\n\nasync function query(term: string): Promise<QueryResponse> {\n  const res = await fetch("' + API_BASE + '/databases/documents/query", {\n    method: "POST",\n    headers: {\n      Authorization: `Bearer ${process.env.AGDB_KEY}`,\n      "Content-Type": "application/json"\n    },\n    body: JSON.stringify({ search: term, topK: 5 })\n  });\n  if (!res.ok) throw new Error(`AGDB error: ${res.status}`);\n  return res.json() as Promise<QueryResponse>;\n}',
  python: 'import requests\n\nresp = requests.post(\n    "' + API_BASE + '/databases/documents/query",\n    headers={\n        "Authorization": "Bearer agdb_sk_YOUR_KEY",\n        "Content-Type": "application/json",\n    },\n    json={"search": "vector index", "topK": 5},\n    timeout=10,\n)\nresp.raise_for_status()\nfor row in resp.json()["rows"]:\n    print(row)',
  zig: 'const std = @import("std");\nconst http = std.http;\n\npub fn main() !void {\n    var gpa = std.heap.GeneralPurposeAllocator(.{}){};\n    const allocator = gpa.allocator();\n    var client = http.Client{ .allocator = allocator };\n    defer client.deinit();\n\n    const uri = try std.Uri.parse("' + API_BASE + '/databases/documents/query");\n    var headers = http.Headers{ .allocator = allocator };\n    try headers.append("Authorization", "Bearer agdb_sk_YOUR_KEY");\n    try headers.append("Content-Type", "application/json");\n\n    var req = try client.request(.POST, uri, headers, .{});\n    defer req.deinit();\n    req.transfer_encoding = .{ .content_length = 38 };\n    try req.start();\n    try req.writer().writeAll("{\\"search\\":\\"vector index\\",\\"topK\\":5}");\n    try req.finish();\n    try req.wait();\n}',
  curl: 'curl -X POST "' + API_BASE + '/databases/documents/query" \\\n  -H "Authorization: Bearer agdb_sk_YOUR_KEY" \\\n  -H "Content-Type: application/json" \\\n  -d \'{"search": "vector index", "topK": 5}\''
};
let sampleLang = "javascript";
Pages.samples = function() {
  const langs = [["javascript", "JavaScript"], ["typescript", "TypeScript"], ["python", "Python"], ["zig", "Zig"], ["curl", "cURL"]];
  return sectionHeader(t("nav_samples"), "Használati példák és SDK kódminták több nyelven.") +
    '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
      '<div class="flex flex-wrap gap-2 mb-5">' + langs.map(l => '<button data-sample-lang="' + l[0] + '" class="px-4 py-2 rounded-full text-sm font-geist ' + (sampleLang === l[0] ? "bg-primary-blue text-white" : "bg-surface-gray dark:bg-background-dark") + '">' + l[1] + '</button>').join("") + '</div>' +
      '<div id="sample-code">' + codeBlock(CODE_SAMPLES[sampleLang], sampleLang) + '</div>' +
    '</div>' +
    '<div class="grid grid-cols-1 md:grid-cols-3 gap-5 mt-6">' +
      sdkCard("npm", "npm install @agdb/sdk", "JavaScript / TypeScript SDK") +
      sdkCard("pip", "pip install agdb", "Python SDK") +
      sdkCard("zig", "zig fetch --save agdb", "Zig csomag") +
    '</div>';

Pages.consoleInit = function() {
  document.getElementById("dc-send").addEventListener("click", () => {
    const method = document.getElementById("dc-method").value;
    const path = document.getElementById("dc-path").value;
    const bodyTxt = document.getElementById("dc-body").value;
    const cont = document.getElementById("dc-response");
    let body;
    try { body = bodyTxt.trim() ? JSON.parse(bodyTxt) : {}; }
    catch (e) { cont.innerHTML = '<div class="p-4 rounded-xl bg-red-50 dark:bg-red-500/10 text-red-600 text-sm font-geist">JSON parse hiba: ' + escapeHtml(e.message) + '</div>'; return; }
    cont.innerHTML = loadingBlock("Kérés küldése...");
    const start = performance.now();
    setTimeout(() => {
      let status = 200, payload;
      if (!State.session || !State.session.apiKey) { status = 401; payload = { error: "unauthorized", message: "Missing API key" }; }
      else if (path.includes("/query") || path.includes("/search")) {
        const result = runQuery({ from: "documents", search: body.search, topK: body.topK, where: body.where, limit: body.limit, orderBy: body.orderBy });
        payload = { rows: result.rows, count: result.rows.length, took: Math.round(performance.now() - start) };
      } else if (path.includes("/health")) { payload = { status: "healthy", uptime: 998877, version: "2.4.0" }; }
      else if (path.includes("/databases")) { payload = { databases: ["documents"], count: 1 }; }
      else { status = 404; payload = { error: "not_found", message: "Unknown endpoint: " + path }; }
      const ms = Math.round(performance.now() - start);
      const statusColor = status < 300 ? "green" : status < 500 ? "amber" : "red";
      cont.innerHTML = '<div class="flex items-center gap-2 mb-3">' + badge(status + " " + (status === 200 ? "OK" : status === 401 ? "Unauthorized" : "Not Found"), statusColor) + badge(ms + " ms", "blue") + '<span class="ml-auto">' + copyButton(JSON.stringify(payload, null, 2), "Válasz") + '</span></div>' +

      addLog("access", method + " " + API_BASE + path, status + " · " + ms + "ms");
    }, 500);
  });
};

Pages.swagger = function() {
  const spec = {
    openapi: "3.1.0",
    info: { title: "AGDB API", version: "2.4.0", description: "Graph + vector database REST API" },
    servers: [{ url: API_BASE }],
    paths: {
      "/databases/{db}/query": { post: { summary: "Run a query", security: [{ bearerAuth: [] }], responses: { "200": { description: "Query result" }, "401": { description: "Unauthorized" } } } },
      "/databases/{db}/search": { post: { summary: "Full text search", security: [{ bearerAuth: [] }], responses: { "200": { description: "Ranked results" } } } },
      "/health": { get: { summary: "Health check", responses: { "200": { description: "Healthy" } } } }
    },
    components: { securitySchemes: { bearerAuth: { type: "http", scheme: "bearer" } } }
  };
  let opsHtml = "";
  for (const path in spec.paths) {
    for (const method in spec.paths[path]) {
      const op = spec.paths[path][method];
      opsHtml += '<details class="border border-border-light dark:border-border-dark rounded-xl mb-3 overflow-hidden">' +
        '<summary class="flex items-center gap-3 p-4 bg-surface-gray dark:bg-background-dark">' + badge(method.toUpperCase(), method === "get" ? "green" : "blue") + '<code class="font-mono text-sm">' + escapeHtml(path) + '</code><span class="text-sm text-text-medium dark:text-text-medium-dark font-geist ml-auto">' + escapeHtml(op.summary) + '</span></summary>' +
        '<div class="p-4"><h4 class="font-medium text-sm mb-2">Válaszok</h4><div class="space-y-1">' + Object.keys(op.responses).map(c => '<div class="flex items-center gap-2 text-sm font-geist">' + badge(c, c.startsWith("2") ? "green" : "red") + escapeHtml(op.responses[c].description) + '</div>').join("") + '</div></div></details>';
    }
  }
  return sectionHeader(t("nav_swagger"), "OpenAPI 3.1 specifikáció interaktív nézetben.",
      btnGhost(ICONS.download + " Spec letöltése", 'data-dl-spec')) +
    '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark mb-6">' +
      '<div class="flex items-center gap-3 mb-5"><h2 class="text-xl font-semibold">' + spec.info.title + '</h2>' + badge("v" + spec.info.version, "blue") + badge("OpenAPI 3.1", "gray") + '</div>' +
      opsHtml +
    '</div>' +
    '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark"><h3 class="font-semibold text-lg mb-4">Nyers specifikáció</h3>' + codeBlock(JSON.stringify(spec, null, 2), "json") + '</div>';
};

    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "agdb-openapi.json"; a.click();

const LEGAL_DOCS = {
  privacy: { title: "Adatvédelmi szabályzat", body: ["Hatályos: 2026. január 1.", "Az AGDB elkötelezett a felhasználói adatok védelme mellett. Ez a szabályzat ismerteti, hogyan gyűjtjük, használjuk és védjük az Ön adatait.", "Adatgyűjtés: A regisztrációkor megadott e-mail címet és a szolgáltatás használata során keletkező technikai adatokat tároljuk.", "Adatfelhasználás: Az adatokat kizárólag a szolgáltatás biztosítására, fejlesztésére és a felhasználói támogatásra használjuk.", "Adatbiztonság: Minden adat titkosítva tárolódik, és háromszoros replikációval védett. A tenantok teljesen izoláltak egymástól.", "Az Ön jogai: Bármikor kérheti adatai exportálását vagy törlését a Tenant kezelés oldalon."] },
  terms: { title: "Felhasználási feltételek", body: ["Hatályos: 2026. január 1.", "A szolgáltatás használatával Ön elfogadja az alábbi feltételeket.", "Szolgáltatás: Az AGDB graph és vektor adatbázis szolgáltatást nyújt API-n keresztül.", "Felhasználói felelősség: Ön felelős az API kulcsai biztonságáért és a fiókján keresztül végzett tevékenységekért.", "Korlátozások: A szolgáltatás a választott csomag szerinti rate limitek és kvóták szerint használható.", "Felelősségkorlátozás: A szolgáltatás \"ahogy van\" alapon érhető el, a vonatkozó SLA garanciák szerint.", "Megszüntetés: Fiókját bármikor törölheti. A feltételek megsértése esetén fenntartjuk a jogot a hozzáférés felfüggesztésére."] }
};
Pages.legalInit = function() {
  if (!isAuthed()) bindPublicNav();
  const renderDoc = (key) => {
    const d = LEGAL_DOCS[key];
    document.getElementById("legal-content").innerHTML = '<h2 class="text-2xl font-semibold mb-2">' + escapeHtml(d.title) + '</h2>' +
      '<p class="text-sm text-text-medium dark:text-text-medium-dark font-geist mb-6">' + escapeHtml(d.body[0]) + '</p>' +
      d.body.slice(1).map(p => '<p class="text-text-medium dark:text-text-medium-dark mb-4 leading-relaxed">' + escapeHtml(p) + '</p>').join("");
  };
  document.querySelectorAll("[data-legal-tab]").forEach(b => b.addEventListener("click", () => {
    document.querySelectorAll("[data-legal-tab]").forEach(x => x.className = "px-4 py-2 rounded-full text-sm font-geist bg-surface-gray dark:bg-surface-dark");
    b.className = "px-4 py-2 rounded-full text-sm font-geist bg-primary-blue text-white";
    renderDoc(b.getAttribute("data-legal-tab"));
  }));
  renderDoc("privacy");
};

            '<tr class="border-b border-border-light dark:border-border-dark last:border-0"><td class="py-2.5 pr-4 font-mono">' + escapeHtml(r[0]) + '</td><td class="py-2.5 pr-4">' + escapeHtml(r[1]) + '</td><td class="py-2.5">' + badge(r[2] === "active" ? "Aktív" : "Felfüggesztve", r[2] === "active" ? "green" : "amber") + '</td></tr>').join("") +
          '</tbody></table></div>' +
      '</div>' +
      '<div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
        '<h3 class="font-semibold text-lg mb-4">Biztonsági események</h3>' +
        '<div class="space-y-3">' +
          State.logs.filter(l => l.type === "security").slice(0, 5).map(l => '<div class="flex items-center gap-3 p-3 rounded-xl bg-surface-gray dark:bg-background-dark"><span class="text-red-500">' + ICONS.shield + '</span><div class="flex-1"><div class="text-sm font-medium">' + escapeHtml(l.message) + '</div><div class="text-xs font-geist text-text-medium dark:text-text-medium-dark">' + fmtRelative(l.ts) + '</div></div></div>').join("") ||

      '<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">' + resourceBar("Klaszter CPU", m.cpu, "%") + resourceBar("Klaszter RAM", m.ram, "%") + resourceBar("Hálózat I/O", 34, "%") + '</div>' +

const CHANGELOG = [
  { version: "2.4.0", date: "2026. január 15.", tag: "Új", changes: ["Hibrid vektor + BM25 keresés", "Új JSON query builder validációval", "Webhook eseménytámogatás", "Sötét mód finomítások"] },
  { version: "2.3.1", date: "2025. december 2.", tag: "Javítás", changes: ["Query timeout kezelés javítva", "Sandbox újraindítás stabilitás", "API kulcs regenerálás hibajavítás"] },
  { version: "2.3.0", date: "2025. november 10.", tag: "Új", changes: ["Audit naplók szűréssel és lapozással", "CSV export támogatás", "Rate limit dashboard"] },
  { version: "2.2.0", date: "2025. október 1.", tag: "Új", changes: ["Több API kulcs kezelése", "Tenant aktivitás követés", "OpenAPI 3.1 specifikáció"] }
];

        '<ul class="space-y-2">' + c.changes.map(ch => '<li class="flex items-start gap-2 text-sm font-geist"><span class="text-emerald-500 mt-0.5">' + ICONS.check + '</span>' + escapeHtml(ch) + '</li>').join("") + '</ul>' +
      '</div>').join("") + '</div>';
};

Pages.feedback = function() {
  return sectionHeader(t("nav_feedback"), "Felhasználói visszajelzés küldése a termékfejlesztéshez.") +
    '<div class="max-w-2xl"><div class="bg-white dark:bg-surface-dark rounded-2xl p-6 border border-border-light dark:border-border-dark">' +
      '<h3 class="font-semibold text-lg mb-4">Hogyan értékelné az AGDB-t?</h3>' +
      '<div id="fb-rating" class="flex gap-2 mb-5">' + [1, 2, 3, 4, 5].map(n => '<button data-rate="' + n + '" class="w-12 h-12 rounded-2xl border-2 border-border-light dark:border-border-dark hover:border-primary-blue font-semibold transition">' + n + '</button>').join("") + '</div>' +
      '<form id="feedback-form">' +
        field("Kategória", '<select id="fb-cat" class="' + inputCls() + '"><option>Általános visszajelzés</option><option>Funkciókérés</option><option>Használhatóság</option><option>Teljesítmény</option></select>') +
        field("Visszajelzés", '<textarea id="fb-msg" rows="6" class="' + inputCls() + ' resize-y" placeholder="Ossza meg velünk a gondolatait..." required></textarea>') +
        '<button type="submit" class="px-6 py-3 rounded-full bg-primary-blue text-white font-semibold inline-flex items-center gap-2">' + ICONS.heart + 'Visszajelzés küldése</button>' +
      '</form>' +
    '</div></div>';
};
Pages.feedbackInit = function() {
  let rating = 0;
  document.querySelectorAll("[data-rate]").forEach(b => b.addEventListener("click", () => {
    rating = parseInt(b.getAttribute("data-rate"));
    document.querySelectorAll("[data-rate]").forEach(x => { const n = parseInt(x.getAttribute("data-rate")); x.className = "w-12 h-12 rounded-2xl border-2 font-semibold transition " + (n <= rating ? "border-primary-blue bg-primary-blue text-white" : "border-border-light dark:border-border-dark hover:border-primary-blue"); });
  }));
  document.getElementById("feedback-form").addEventListener("submit", e => {
    e.preventDefault();
    if (!rating) { toast("Kérjük, adjon értékelést", "warning"); return; }
    addLog("ops", "Visszajelzés elküldve", "értékelés: " + rating + "/5");
    pushNotification("Köszönjük a visszajelzést!", "Az értékelése (" + rating + "/5) rögzítve lett.", "success");
    toast("Köszönjük a visszajelzését!", "success");
    document.getElementById("feedback-form").reset();
    rating = 0;
    document.querySelectorAll("[data-rate]").forEach(x => x.className = "w-12 h-12 rounded-2xl border-2 border-border-light dark:border-border-dark hover:border-primary-blue font-semibold transition");
  });
};
</script>
